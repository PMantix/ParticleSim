# EIS validation scenario — flat symmetric Li/Li cell
# Phase 1 of docs/EIS_AMPLITUDE_STUDY_PLAN.md.
#
# Two flat Li-metal foil electrodes facing each other across a uniform
# electrolyte volume. No initial roughness, no dendrites, no dead Li.
# Goal: produce a recognizable Randles-style Nyquist when EIS engages.
#
# Geometry:
#   inter-electrode separation        250 Å   (sets f_W ≈ 160 MHz, see eis_similitude.md)
#   lateral electrode height          200 Å   (≥ 100 Å spec minimum, ×2 for buffer)
#   metal block dimensions            50 × 200 Å   each side
#   foil dimensions                   7 × 200 Å    each side, embedded in metal block
#   domain                            400 × 200 Å  (50 Å buffer outside each electrode)
#
# Electrolyte composition matches the bulk_electrolyte.toml density
# (5471 particles in 600×400 = 0.0228 particles/Å²) scaled to the available
# electrolyte volume after subtracting electrode area:
#   electrolyte volume = 400×200 - 2 × 50×200 = 60,000 Å²
#   60,000 × 0.0228 ≈ 1369 particles total
#   1M LiPF6 / 1:1 EC:DMC composition: 86 Li⁺ + 86 PF6⁻ + 598 EC + 599 DMC
#
# Note: relies on scenario.rs skipping add_default_electrolyte when [[particles.random]]
# is non-empty. Earlier (commit fd1c2d4) this scenario was double-loaded (TOML +
# default), which caused visible overlap and placement failures. The
# scenario.rs fix lands alongside this restoration of the bulk-matched counts.

[simulation]
domain_width = 400.0
domain_height = 200.0
initial_temperature = 300.0
enable_out_of_plane = false

[particles]

# Left electrode (Li metal, centered at x = -150)
[[particles.metal_rectangles]]
x = -150.0
y = 0.0
width = 50.0
height = 200.0
species = "LithiumMetal"

[[particles.foil_rectangles]]
x = -150.0
y = 0.0
width = 7.0
height = 200.0
current = 0.0  # idle until EIS engages

# Right electrode (Li metal, centered at x = +150)
[[particles.metal_rectangles]]
x = 150.0
y = 0.0
width = 50.0
height = 200.0
species = "LithiumMetal"

[[particles.foil_rectangles]]
x = 150.0
y = 0.0
width = 7.0
height = 200.0
current = 0.0

# Electrolyte (1M LiPF6, 1:1 EC:DMC, no VC for simplicity in validation)
[[particles.random]]
count = 86
species = "LithiumIon"

[[particles.random]]
count = 86
species = "ElectrolyteAnion"

[[particles.random]]
count = 598
species = "EC"

[[particles.random]]
count = 599
species = "DMC"
